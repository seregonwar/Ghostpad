name: Build Native Client

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Client (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Linux Build Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev xorg-dev pkg-config

      - name: Configure CMake
        run: |
          cmake -S Ghostpad-native -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Application
        run: |
          cmake --build build --config Release -j2

      - name: Upload Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ghostpad-native-windows
          path: |
            build/Release/ghostpad-native.exe
            build/ghostpad-settings.json

      - name: Upload Artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ghostpad-native-macos
          path: |
            build/ghostpad-native.app

      - name: Upload Artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ghostpad-native-linux
          path: |
            build/ghostpad-native
            build/ghostpad-settings.json
